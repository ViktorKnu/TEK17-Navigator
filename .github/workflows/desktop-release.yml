name: Build Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for eksempel v1.6.0"
        required: true
        default: "v1.6.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build desktop app
        run: npm run desktop:build -- --publish never

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          $tag = if ($env:EVENT_NAME -eq "workflow_dispatch") { $env:INPUT_TAG } else { $env:REF_NAME }
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $setup = "dist/desktop/TEK17 Navigator Setup $version.exe"
          $portable = "dist/desktop/TEK17 Navigator $version.exe"
          $notes = @"
          TEK17 Navigator desktop for Windows.

          Inneholder:
          - Installer: TEK17 Navigator Setup $version.exe
          - Portable app: TEK17 Navigator $version.exe
          - Modellvalg for Qwen 3, Gemma 3 og norsktilpasset Borealis
          - Qwen 3 4B som raskt standardvalg med kortere, kildebundne svar
          - 33 kildebiter som dekker TEK17 §§ 11-1 til 11-17 med veiledning
          - Tydelig skille mellom forskriftskrav, veiledning og preaksepterte ytelser
          - Forbedret RAG-søk med fagfraser, synonymer, treffterskel og dynamisk kildeantall
          - Katalog med offentlig metadata for 14 branntekniske Byggforsk-anvisninger
          - Byggforsk vises tydelig som faglig fordypning, ikke som forskriftskrav eller preakseptert ytelse
          - Ollama kan bruke inntil tre katalogtreff og anbefale høyst én relevant anvisning
          - Byggforsk-fulltekst lagres ikke og sendes ikke til den lokale modellen
          - TEK17/SAK10-klassifisering med kildebasert fallback uten lokal modell

          Ollama må være installert for lokal LLM. Appen forsøker å starte Ollama automatisk hvis den finner ollama.exe.
          "@

          if (gh release view $tag 2>$null) {
            gh release upload $tag $setup $portable --clobber
          } else {
            gh release create $tag $setup $portable --target $env:TARGET_SHA --title "TEK17 Navigator $tag" --notes $notes --latest
          }
